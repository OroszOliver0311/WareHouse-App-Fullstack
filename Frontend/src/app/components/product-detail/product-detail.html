<div class="dashboard-container">
  @if (product(); as p) {
    <div class="table-wrapper">
      
      <div class="edit-form">
        <h2>Product Details</h2>
        
        <div class="form-group">
          <label for="productName">Name:</label>
          <input id="productName" type="text" [(ngModel)]="editedData.name" (ngModelChange)="onFieldChange()">
        </div>

        <div class="form-group">
          <label for="productSku">SKU:</label>
          <input id="productSku" type="text" [(ngModel)]="editedData.sku" (ngModelChange)="onFieldChange()">
        </div>

        <div class="form-group">
          <label for="productPrice">Unit Price ($):</label>
          <input id="productPrice" type="number" [(ngModel)]="editedData.unitPrice" (ngModelChange)="onFieldChange()">
        </div>

        <div style="margin-top: 25px; text-align: left;">
          <button mat-raised-button 
                  class="save-btn" 
                  [disabled]="!isDirty" 
                  (click)="saveChanges()">
            Save Changes
          </button>
        </div>
      </div>

      <h3>Stock Distribution</h3>
      <table mat-table [dataSource]="p.stocks" class="mat-elevation-z8">
        
        <ng-container matColumnDef="warehouse">
          <th mat-header-cell *matHeaderCellDef> Warehouse </th>
          <td mat-cell *matCellDef="let element"> {{ element.name || 'Unnamed Warehouse' }} </td>
        </ng-container>

        <ng-container matColumnDef="location">
          <th mat-header-cell *matHeaderCellDef> Location </th>
          <td mat-cell *matCellDef="let element"> {{ element.location }} </td>
        </ng-container>

        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef> Quantity </th>
          <td mat-cell *matCellDef="let element"> 
            <input type="number" 
                   class="stock-input" 
                   [(ngModel)]="element.quantity"> pcs
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> </th>
          <td mat-cell *matCellDef="let element" style="text-align: left;">
            <button mat-raised-button 
                    class="update-stock-btn"
                    [disabled]="!isStockDirty(element.id, element.quantity)"
                    (click)="updateStock(element.id, element.quantity)">
              Update
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

    </div>

    <button mat-raised-button class="fixed-back-btn" (click)="goBack()">
      ← Back to Dashboard
    </button>
    
  } @else {
    <div class="table-wrapper">
      <p>Loading product details...</p>
    </div>
  }
</div>
