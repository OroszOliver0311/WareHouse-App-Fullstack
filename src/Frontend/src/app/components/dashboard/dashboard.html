<div class="dashboard-wrapper">
  
<div class="left-column">
    <div class="action-card">
      <h2>Add New Product</h2>

      <div class="form-group">
        <label for="newName">Name:</label>
        <input id="newName" type="text" [(ngModel)]="newProduct.name" placeholder="e.g. Keychron K2">
      </div>

      <div class="form-group">
        <label for="newSku">SKU:</label>
        <input id="newSku" type="text" [(ngModel)]="newProduct.sku" placeholder="e.g. KEY-K2">
      </div>

      <div class="form-group">
        <label for="newPrice">Unit Price ($):</label>
        <input id="newPrice" type="number" [(ngModel)]="newProduct.unitPrice" placeholder="e.g. 25000">
      </div>

      <div style="margin-top: 25px; text-align: left;">
        <button mat-raised-button 
                class="add-btn" 
                [disabled]="!isFormValid()" 
                (click)="addProduct()">
          + Add Product
        </button>
      </div>
    </div>

    <div class="action-card" style="margin-top: 30px;">
      <h2>Add New Location</h2>

      <div class="form-group">
        <label for="newWhName">Warehouse Name:</label>
        <input id="newWhName" type="text" [(ngModel)]="newWarehouse.name" placeholder="e.g. Budapesti Központi Raktár">
      </div>

      <div class="form-group">
        <label for="newWhLocation">Location:</label>
        <input id="newWhLocation" type="text" [(ngModel)]="newWarehouse.location" placeholder="e.g. Budapest, 11. kerület">
      </div>

      <div style="margin-top: 25px; text-align: left;">
        <button mat-raised-button 
                class="add-btn" 
                [disabled]="!isWarehouseFormValid()" 
                (click)="addWarehouse()">
          + Add Location
        </button>
      </div>
    </div>
  </div>

  <div class="right-column">
    <div class="dashboard-card">
      <h2>Inventory Dashboard</h2>

      <div class="table-container">
        <table mat-table [dataSource]="dataSource()" class="mat-elevation-z8">

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Product Name </th>
            <td mat-cell *matCellDef="let element"> {{element.name}} </td>
          </ng-container>

          <ng-container matColumnDef="sku">
            <th mat-header-cell *matHeaderCellDef> SKU </th>
            <td mat-cell *matCellDef="let element"> {{element.sku}} </td>
          </ng-container>

          <ng-container matColumnDef="totalQuantity">
            <th mat-header-cell *matHeaderCellDef> Total Quantity </th>
            <td mat-cell *matCellDef="let element"> <b>{{element.totalQuantity}} pcs</b> </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> </th>
            <td mat-cell *matCellDef="let element" style="text-align: left;">
              <button mat-icon-button class="delete-btn" (click)="deleteProduct(element.id, $event)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          
          <tr mat-row *matRowDef="let row; columns: displayedColumns;" 
              (click)="onRowClick(row.id)"
              (keydown.enter)="onRowClick(row.id)"
              (keydown.space)="onRowClick(row.id)"
              tabindex="0"
              style="cursor: pointer;">
          </tr>
        </table>
      </div>
    </div>
  </div>

</div>
